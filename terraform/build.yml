version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - echo HELLO_WORLD_1
            - npm ci --cache .npm --prefer-offline --legacy-peer-deps
        build:
          commands:
            - VITE_API_URL=${VITE_API_URL}
            - VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}
            - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
            - VITE_GOOGLE_REDIRECT_URI=${VITE_GOOGLE_REDIRECT_URI}
            - VITE_GOOGLE_SCOPES=${VITE_GOOGLE_SCOPES}
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
    appRoot: ZalaFrontend
